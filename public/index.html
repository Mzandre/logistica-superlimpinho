<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Logística - Novo Pedido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>
      <img src="/superlimpinho.png" alt="SuperLimpinho" style="height: 60px; vertical-align: middle; margin-right: 10px;">
      Sistema de Logística
    </h1>
    <p>Novo Pedido - Vendedor</p>
  </header>

  <div class="container">
    <div class="card fade-in">
      <h2>📝 Criar Novo Pedido</h2>

      <div id="message" class="message" style="display: none;"></div>

      <form id="pedidoForm">
        <div class="form-group">
          <label for="cliente">Nome do Cliente *</label>
          <input type="text" id="cliente" name="cliente" required placeholder="Digite o nome do cliente">
        </div>

        <div class="form-group">
          <label for="vendedor">Nome do Vendedor *</label>
          <input type="text" id="vendedor" name="vendedor" required placeholder="Digite o nome do vendedor">
        </div>

        <div class="form-group">
          <label for="observacao">Observação (opcional)</label>
          <textarea id="observacao" name="observacao" placeholder="Adicione observações sobre o pedido..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary">
          🚀 Enviar para Separação
        </button>
      </form>
    </div>

    <div class="card fade-in">
      <h2>📋 Links Úteis</h2>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <a href="/logistica" class="btn btn-success">👷 Painel de Separação</a>
        <a href="/painel" class="btn btn-warning">📺 Painel do Gerente</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
